<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher - Geheimnis enthüllt</title>
    <link rel="stylesheet" href="secret-styles.css">
</head>
<body>
    <div class="secret-container">
        <a href="index.html" class="back-btn">← Zurück</a>
        
        <div class="secret-box">
            <h1 class="secret-title" data-text="CIPHER">CIPHER</h1>
            <p class="secret-subtitle">Der Code wurde entschlüsselt</p>
            
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&h=600&fit=crop" 
                     alt="Mysteriöses Bild" 
                     class="secret-image">
                <div class="image-overlay"></div>
            </div>
            
            <div class="secret-message">
                <p>"Jede Verschlüsselung hat einen Schlüssel,</p>
                <p>und jeder Schlüssel wartet darauf, gefunden zu werden."</p>
            </div>
            
            <div class="code-display">
                <span class="code-label">Dein Code war:</span>
                <span class="code-value">cipher</span>
            </div>
        </div>
    </div>
