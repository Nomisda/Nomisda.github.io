<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>Enigma - Geheimnis enthüllt</title>
    <link rel="stylesheet" href="secret-styles.css">
</head>
<body>
    <div class="secret-container">
        <a href="index.html" class="back-btn">← Zurück</a>
        
        <div class="secret-box">
            <h1 class="secret-title" data-text="ENIGMA">ENIGMA</h1>
            <p class="secret-subtitle">Das Rätsel wurde gelöst</p>
            
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop"

                     class="secret-image">

            </div>
            
            <div class="secret-message">
                <p>"Manche Rätsel sind nicht dazu da, gelöst zu werden,</p>
                <p>sondern um uns zu zeigen, dass wir noch viel zu lernen haben."</p>
            </div>
            
            <div class="code-display">
                <span class="code-label">Dein Code war:</span>
                <span class="code-value">enigma</span>
            </div>
        </div>
